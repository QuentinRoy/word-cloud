<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<link rel="icon" type="image/svg+xml" href="/demo/favicon.svg">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Word Cloud Demo</title>
		<script type="module" src="/demo/main.ts"></script>
	</head>
	<body>
		<x-word-cloud mode="input"></x-word-cloud>
		<form id="controls">
			<div class="control-group">
				<div>
					<input type="radio" name="mode" value="input" id="input-mode" checked>
					<label for="input-mode">Input Mode (<kbd>I</kbd>)</label>
				</div>
				<div>
					<input type="radio" name="mode" value="check" id="check-mode">
					<label for="check-mode">Check Mode (<kbd>C</kbd>)</label>
				</div>
				<div>
					<input type="radio" name="mode" value="delete" id="delete-mode">
					<label for="delete-mode">Delete Mode (<kbd>D</kbd>)</label>
				</div>
			</div>
			<div>
				<button type="button" id="clear" value="Clear">
					Clear (<kbd>D</kbd>, <kbd>D</kbd>)
				</button>
			</div>
		</form>
	</body>
</html>
