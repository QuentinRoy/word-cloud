<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<link rel="icon" type="image/svg+xml" href="/demo/favicon.svg">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Word Cloud Demo</title>
		<script type="module" src="/demo/main.ts"></script>
	</head>
	<body>
		<x-word-cloud word-action="drag" has-input></x-word-cloud>
		<footer>
			<form id="controls">
				<div class="control-group">
					<div>
						<input
							type="radio"
							name="word-action"
							value="drag"
							id="word-action-drag"
							checked
						>
						<label for="word-action-drag"
							>Drag <span class="hotkey"><kbd>G</kbd></span></label
						>
					</div>
					<div>
						<input
							type="radio"
							name="word-action"
							value="check"
							id="word-action-check"
						>
						<label for="word-action-check"
							>Check <span class="hotkey"><kbd>C</kbd></span></label
						>
					</div>
					<div>
						<input
							type="radio"
							name="word-action"
							value="delete"
							id="word-action-delete"
						>
						<label for="word-action-delete"
							>Delete <span class="hotkey"><kbd>D</kbd></span></label
						>
					</div>
				</div>
				<div class="control-group">
					<div>
						<input type="checkbox" name="has-input" id="has-input" checked>
						<label for="has-input"
							>Input <span class="hotkey"><kbd>I</kbd></span></label
						>
					</div>
				</div>
				<div><button type="button" id="clear" value="Clear">Clear</button></div>
			</form>
			<a id="github-link" href="https://github.com/QuentinRoy/word-cloud"
				><img src="/demo/github.svg" alt="GitHub"></a
			>
		</footer>
	</body>
</html>
