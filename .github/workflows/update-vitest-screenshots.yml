name: Update Visual Regression Screenshots

on:
  pull_request:
    types: [labeled]

env:
  AUTHOR_NAME: "github-actions[bot]"
  AUTHOR_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"
  COMMIT_MESSAGE: |
    test: update visual regression screenshots

    Co-authored-by: ${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>

jobs:
  update-screenshots:
    runs-on: ubuntu-24.04

    # only run when the correct label is added
    if: >
      github.event.label.name == 'update screenshots' &&
      github.event.pull_request.head.ref != github.event.repository.default_branch

    concurrency:
      group: visual-regression-screenshots@${{ github.event.pull_request.head.ref }}
      cancel-in-progress: true

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Configure Git
        run: |
          git config --global user.name "${{ env.AUTHOR_NAME }}"
          git config --global user.email "${{ env.AUTHOR_EMAIL }}"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps --only-shell chromium

      - name: Update Visual Regression Screenshots
        run: pnpm run test --update

      - name: Check for changes
        id: check_changes
        run: |
          CHANGED_FILES=$(git status --porcelain | awk '{print $2}')
          if [ "${CHANGED_FILES:+x}" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected"

            echo "changed_files<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "changed_count=$(echo "$CHANGED_FILES" | wc -l)" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          fi

      - name: Commit changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git add -A
          git commit -m "${{ env.COMMIT_MESSAGE }}"

      - name: Push changes
        if: steps.check_changes.outputs.changes == 'true'
        run: git push origin ${{ github.event.pull_request.head.ref }}

      - name: Build summary
        id: summary
        run: |
          if [[ "${{ steps.check_changes.outputs.changes }}" == "true" ]]; then
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "### 📸 Visual Regression Screenshots Updated" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "Updated **${{ steps.check_changes.outputs.changed_count }}** screenshot(s) on \`${{ github.event.pull_request.head.ref }}\`." >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "#### Changed Files:" >> $GITHUB_OUTPUT
            echo "\`\`\`" >> $GITHUB_OUTPUT
            echo "${{ steps.check_changes.outputs.changed_files }}" >> $GITHUB_OUTPUT
            echo "\`\`\`" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "✅ Changes committed and pushed." >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "### ℹ️ No Screenshot Updates Required" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "All screenshots are already up to date." >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Write summary to job
        run: echo "${{ steps.summary.outputs.body }}" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR
        if: always()
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "${{ steps.summary.outputs.body }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove trigger label
        if: always()
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --remove-label "update-screenshots"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}